etfs:
- SPY
- QQQ
- VTI
- VEA
- VWO
- TLT
- GLD
- IEF
- LQD
- DBC
portfolio:
  initial_capital: 500
  max_capital: 500
  max_holdings: 3
  sizing_method: score_proportional
  rebalance_threshold: 0.05
