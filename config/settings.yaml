etfs:
- SPY
- QQQ
- VTI
- VEA
- VWO
- TLT
- GLD
portfolio:
  initial_capital: 500
  max_capital: 500
  max_holdings: 3
  sizing_method: score_proportional
  rebalance_threshold: 0.05
  min_trade_value: 1
factors:
  momentum:
    windows:
    - 21
    - 63
    - 126
    weights:
    - 0.33
    - 0.33
    - 0.34
  volatility:
    window: 63
  trend:
    sma_short: 50
    sma_long: 200
  mean_reversion:
    rsi_period: 14
    oversold_threshold: 30
    overbought_threshold: 70
scoring:
  momentum_weight: 0.35
  volatility_weight: 0.25
  trend_weight: 0.25
  mean_reversion_weight: 0.15
risk:
  max_drawdown: 0.15
  cooldown_days: 5
broker:
  name: alpaca
  paper_trading: true
  base_url_paper: https://paper-api.alpaca.markets
  base_url_live: https://api.alpaca.markets
data:
  provider: yfinance
  history_days: 252
logging:
  level: INFO
  file: logs/traderbot.log
